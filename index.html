<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GS QUIZ HUB</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#1e3a8a,#7c3aed);
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:22px;
  font-size:32px;
  font-weight:bold;
  color:#00ffcc;
  text-shadow:0 0 10px #00ffcc;
}

/* HOME */
#home{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding:20px;
}

/* CARDS */
.card{
  padding:22px;
  text-align:center;
  border-radius:18px;
  cursor:pointer;
  font-weight:bold;
  font-size:16px;
  transition:0.3s;
  color:white;
}

/* COLORS */
.c1{background:linear-gradient(135deg,#ef4444,#f97316);}
.c2{background:linear-gradient(135deg,#3b82f6,#06b6d4);}
.c3{background:linear-gradient(135deg,#22c55e,#16a34a);}
.c4{background:linear-gradient(135deg,#a855f7,#ec4899);}
.c5{background:linear-gradient(135deg,#eab308,#f97316);}
.c6{background:linear-gradient(135deg,#64748b,#334155);}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px rgba(255,255,255,0.3);
}

/* QUIZ */
#quizBox{
  display:none;
  padding:20px;
}

.btn{
  padding:12px;
  margin:6px;
  background:#00ffcc;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  color:black;
}
</style>
</head>

<body>

<header>🔥 GS QUIZ HUB 🔥</header>

<!-- HOME -->
<div id="home">

  <div class="card c1" onclick="startQuiz('railway')">🚆 Railway</div>
  <div class="card c2" onclick="startQuiz('ssc')">📘 SSC</div>
  <div class="card c3" onclick="startQuiz('police')">👮 Police</div>
  <div class="card c4" onclick="startQuiz('form')">📝 Form Test</div>
  <div class="card c5" onclick="startQuiz('dimag')">🧠 Dimag Test</div>

  <div class="card c2" onclick="showResult()">📊 Result</div>
  <div class="card c4" onclick="resetData()">♻ Reset</div>
  <div class="card c1" onclick="about()">ℹ About</div>

</div>

<!-- QUIZ -->
<div id="quizBox">
  <h2 id="q"></h2>
  <div id="opt"></div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("gsquiz")) || {
  railway:[
    {question:"भारत की राजधानी?",options:["Mumbai","Delhi","Kolkata","Chennai"],answer:"Delhi"},
    {question:"भारत का सबसे लंबा प्लेटफॉर्म?",options:["Gorakhpur","New Delhi","Howrah","Mumbai CST"],answer:"Gorakhpur"}
  ],
  ssc:[
    {question:"1 का वर्ग क्या है?",options:["1","2","3","4"],answer:"1"}
  ],
  police:[],
  form:[],
  dimag:[
    {question:"10 ÷ 2 + 5 = ?",options:["10","8","7","5"],answer:"10"}
  ]
};

let current=[], i=0;

function startQuiz(type){
  current = data[type] || [];
  i=0;

  document.getElementById("home").style.display="none";
  document.getElementById("quizBox").style.display="block";

  show();
}

function show(){
  if(current.length==0){
    alert("No Questions Added");
    location.reload();
    return;
  }

  let q = current[i];
  document.getElementById("q").innerText = q.question;

  let html="";
  q.options.forEach(o=>{
    html += `<button class="btn" onclick="check('${o}')">${o}</button><br>`;
  });

  document.getElementById("opt").innerHTML = html;
}

function check(ans){
  if(ans==current[i].answer){
    alert("✔ Correct");
  }else{
    alert("❌ Wrong");
  }

  i++;
  if(i<current.length){
    show();
  }else{
    alert("Test Finished 🎉");
    location.reload();
  }
}

/* OPTIONS */
function showResult(){
  alert("Result feature coming soon 🚀");
}

function resetData(){
  localStorage.removeItem("gsquiz");
  alert("Reset Done ♻");
  location.reload();
}

function about(){
  alert("GS QUIZ HUB - Railway, SSC, Police Exam Practice App 🔥");
}

</script>

</body>
      </html>
