<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GS QuizHub</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

/* HEADER */
header{
  background: linear-gradient(90deg,#ff512f,#dd2476);
  padding:20px;
  text-align:center;
  font-size:26px;
  font-weight:bold;
  letter-spacing:1px;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* HERO */
.hero{
  padding:30px 20px;
  text-align:center;
}

.hero h1{
  font-size:30px;
  margin-bottom:10px;
}

.hero p{
  opacity:0.9;
  font-size:16px;
}

/* BUTTONS */
.btn-container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  margin-top:20px;
  gap:15px;
}

.btn{
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  padding:15px 20px;
  border-radius:12px;
  text-decoration:none;
  color:white;
  font-weight:bold;
  width:140px;
  text-align:center;
  transition:0.3s;
  box-shadow:0 5px 10px rgba(0,0,0,0.3);
}

.btn:hover{
  transform:scale(1.05);
}

/* DAILY PRACTICE BOX */
.practice{
  margin:30px 20px;
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
  text-align:center;
  backdrop-filter: blur(10px);
}

.practice h2{
  margin-bottom:10px;
  color:#ffd700;
}

/* FOOTER */
footer{
  margin-top:30px;
  text-align:center;
  padding:15px;
  background:#111;
  font-size:14px;
}
</style>

</head>

<body>

<header>
🔥 GS QUIZHUB 🔥
</header>

<div class="hero">
  <h1>Welcome to Best GK Quiz Platform</h1>
  <p>Daily Practice karo aur apni knowledge strong banao 💪</p>

  <div class="btn-container">
    <a href="#" class="btn">Start Quiz</a>
    <a href="#" class="btn">GK Test</a>
    <a href="#" class="btn">Math Quiz</a>
    <a href="#" class="btn">Current Affairs</a>
  </div>
</div>

<div class="practice">
  <h2>📚 Daily Practice Zone</h2>
  <p>Roz 10 questions solve karo aur top bano 🏆</p>
  <a href="#" class="btn" style="margin-top:15px;">Start Practice</a>
</div>

<footer>
© 2026 GS QuizHub | Made with ❤️
</footer>

</body>
</html>
